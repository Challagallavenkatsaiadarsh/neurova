name: Android Build (APK)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ===============================
      # SYSTEM DEPENDENCIES
      # ===============================
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip wget \
            openjdk-17-jdk \
            build-essential \
            libffi-dev libssl-dev \
            libgl1-mesa-dev libgles2-mesa-dev libsdl2-dev

      # ===============================
      # PYTHON TOOLS
      # ===============================
      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython kivy kivymd

      # ===============================
      # ANDROID SDK (FIXED STRUCTURE)
      # ===============================
      - name: Setup Android SDK (FIXED AIDL + SDK)
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME

          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

          cd $HOME

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-*.zip -d $ANDROID_HOME

          # FIXED: proper structure (NO broken mv)
          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          mv $ANDROID_HOME/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/ || true

          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH

          yes | sdkmanager --licenses || true

          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

      # ===============================
      # FIX OPENGL / CI SAFETY
      # ===============================
      - name: Set safe environment
        run: |
          echo "KIVY_GL_BACKEND=angle_sdl2" >> $GITHUB_ENV
          echo "SDL_VIDEODRIVER=dummy" >> $GITHUB_ENV

      # ===============================
      # BUILD APK
      # ===============================
      - name: Initialize Buildozer
        run: |
          buildozer init || true

      - name: Build Android APK
        run: |
          buildozer -v android debug