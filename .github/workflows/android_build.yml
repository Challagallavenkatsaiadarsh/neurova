name: Android Build (APK)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ===============================
      # SYSTEM DEPENDENCIES
      # ===============================
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip wget \
            openjdk-17-jdk \
            build-essential \
            libffi-dev libssl-dev \
            libgl1-mesa-dev libgles2-mesa-dev libsdl2-dev

      # ===============================
      # PYTHON TOOLS
      # ===============================
      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython kivy kivymd

      # ===============================
      # FORCE STABLE ANDROID SDK (FIXED)
      # ===============================
      - name: Setup Android SDK (FIXED BUILD TOOLS + AIDL)
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME

          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

          cd $HOME

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-*.zip -d $ANDROID_HOME

          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          mv $ANDROID_HOME/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/ || true

          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH

          # 🔥 FORCE LICENSE ACCEPTANCE (FIX #1)
          yes | sdkmanager --licenses || true

          # 🔥 INSTALL ONLY STABLE TOOLS (FIX #2)
          sdkmanager --sdk_root=$ANDROID_HOME \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

      # ===============================
      # FORCE BUILD TO USE STABLE SDK
      # ===============================
      - name: Force Buildozer SDK config
        run: |
          mkdir -p ~/.buildozer
          echo "[app]" > buildozer.spec
          echo "android.api = 33" >> buildozer.spec
          echo "android.build_tools_version = 33.0.2" >> buildozer.spec

      # ===============================
      # FIX OPENGL / CI
      # ===============================
      - name: Set safe environment
        run: |
          echo "KIVY_GL_BACKEND=mock" >> $GITHUB_ENV
          echo "SDL_VIDEODRIVER=dummy" >> $GITHUB_ENV

      # ===============================
      # BUILD APK
      # ===============================
      - name: Initialize Buildozer
        run: |
          buildozer init || true

      - name: Build Android APK
        run: |
          buildozer -v android debug