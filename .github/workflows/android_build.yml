name: Android Build (APK Fully Fixed)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ================= SYSTEM DEPENDENCIES =================
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip wget openjdk-17-jdk \
          build-essential libffi-dev libssl-dev \
          libgl1-mesa-dev libgles2-mesa-dev libsdl2-dev

      # ================= PYTHON TOOLS =================
      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython kivy kivymd

      # ================= ANDROID SDK (FULL FIX) =================
      - name: Setup Android SDK (FIXED cmdline-tools + sdkmanager)
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME

          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

          cd $HOME

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-*.zip -d $ANDROID_HOME

          # ================= FIX STRUCTURE SAFELY =================
          mkdir -p $ANDROID_HOME/cmdline-tools/latest

          if [ -d "$ANDROID_HOME/cmdline-tools/cmdline-tools" ]; then
            mv $ANDROID_HOME/cmdline-tools/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
          elif [ -d "$ANDROID_HOME/cmdline-tools/bin" ]; then
            mv $ANDROID_HOME/cmdline-tools/bin $ANDROID_HOME/cmdline-tools/latest/
          fi

          # ================= FORCE PATH =================
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH

          # ================= VERIFY SDKMANAGER =================
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --version

          # ================= ACCEPT LICENSES =================
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

          # ================= INSTALL REQUIRED TOOLS =================
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

      # ================= BUILD =================
      - name: Initialize Buildozer safely
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi

      - name: Build APK
        run: |
          buildozer -v android debug