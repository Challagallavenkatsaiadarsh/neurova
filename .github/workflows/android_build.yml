name: Android Build (APK)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ===============================
      # SET PYTHON
      # ===============================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ===============================
      # SYSTEM DEPENDENCIES
      # ===============================
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip wget \
            openjdk-17-jdk \
            build-essential \
            libffi-dev libssl-dev \
            libgl1-mesa-dev libgles2-mesa-dev libsdl2-dev

      # ===============================
      # PYTHON TOOLS
      # ===============================
      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython kivy kivymd

      # ===============================
      # ANDROID SDK (FIXED AIDL + PATH ALIGNMENT)
      # ===============================
      - name: Setup Android SDK (FIXED AIDL)
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME

          mkdir -p $ANDROID_HOME

          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

          cd $HOME

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-*.zip -d $ANDROID_HOME

          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          mv $ANDROID_HOME/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/ || true

          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH

          yes | sdkmanager --licenses || true

          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

      # ===============================
      # FORCE BUILD OZER CONFIG (NO OVERWRITE BUG)
      # ===============================
      - name: Setup Buildozer config (DO NOT INIT)
        run: |
          mkdir -p ~/.buildozer

          echo "[app]" > buildozer.spec
          echo "title = Neurova" >> buildozer.spec
          echo "package.name = neurova" >> buildozer.spec
          echo "package.domain = org.neurova" >> buildozer.spec
          echo "source.dir = ." >> buildozer.spec
          echo "version = 1.0" >> buildozer.spec
          echo "android.api = 33" >> buildozer.spec
          echo "android.build_tools_version = 33.0.2" >> buildozer.spec
          echo "android.ndk = 25.2.9519653" >> buildozer.spec

      # ===============================
      # SAFE ENVIRONMENT (KIVY FIX)
      # ===============================
      - name: Set safe environment
        run: |
          echo "KIVY_GL_BACKEND=mock" >> $GITHUB_ENV
          echo "SDL_VIDEODRIVER=dummy" >> $GITHUB_ENV

      # ===============================
      # BUILD APK
      # ===============================
      - name: Build Android APK
        run: |
          buildozer -v android debug