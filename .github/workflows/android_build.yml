name: Android Build (APK)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip wget \
            openjdk-17-jdk \
            build-essential \
            libffi-dev libssl-dev \
            libgl1-mesa-dev libgles2-mesa-dev libsdl2-dev

      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython kivy kivymd

      # ===============================
      # FIX: FORCE STABLE ANDROID SDK
      # ===============================
      - name: Setup Android SDK (FIXED NDK + AIDL)
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME

          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

          cd $HOME

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-*.zip -d $ANDROID_HOME

          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          mv $ANDROID_HOME/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/ || true

          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH

          yes | sdkmanager --licenses || true

          sdkmanager --sdk_root=$ANDROID_HOME \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      # ===============================
      # 🔥 IMPORTANT FIX: DISABLE BROKEN NDK DOWNLOAD
      # ===============================
      - name: Force Buildozer config (NO auto NDK download)
        run: |
          mkdir -p ~/.buildozer

          cat > buildozer.spec << EOF
[app]
title = Neurova
package.name = neurova
package.domain = org.neurova
source.dir = .
version = 1.0

android.api = 33
android.build_tools_version = 33.0.2
android.ndk = 25.1.8937393
EOF

      # ===============================
      # FIX OPENGL / CI
      # ===============================
      - name: Set safe environment
        run: |
          echo "KIVY_GL_BACKEND=mock" >> $GITHUB_ENV
          echo "SDL_VIDEODRIVER=dummy" >> $GITHUB_ENV

      - name: Clean build cache
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer

      - name: Build APK
        run: |
          buildozer -v android debug