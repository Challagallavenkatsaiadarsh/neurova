name: macOS Build

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install kivy kivymd pyinstaller requests

      - name: Build
        run: |
          pyinstaller --onefile --name Neurova main.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/