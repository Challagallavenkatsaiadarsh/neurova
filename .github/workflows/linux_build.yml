name: Linux Build

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install Python libs
        run: |
          pip install kivy kivymd pyinstaller requests

      - name: Build
        run: |
          pyinstaller --onefile --name Neurova main.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/