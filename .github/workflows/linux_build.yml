name: Linux Build (Python Kivy App)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies (Kivy requirements)
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            python3-dev \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install kivy kivymd pyinstaller requests

      - name: Build Linux App
        run: |
          pyinstaller --onefile --name Neurova main.py

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/