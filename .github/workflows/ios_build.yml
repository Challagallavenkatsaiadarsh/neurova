name: iOS Build (Kivy Placeholder)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install kivy kivymd cython

      - name: iOS Build (NOT REAL IPA yet)
        run: |
          echo "⚠ Kivy iOS needs kivy-ios toolchain + Apple signing"
          echo "This is placeholder build step"

      - name: Upload project snapshot
        uses: actions/upload-artifact@v4
        with:
          name: ios-source
          path: .