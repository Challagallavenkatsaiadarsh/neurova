name: Apple Build (iOS + macOS)

on:
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install kivy kivymd pyinstaller

      - name: Build macOS App (PyInstaller)
        run: |
          pyinstaller --noconfirm --onefile --windowed --name Neurova main.py

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: neurova-macos
          path: dist/


  build-ios:
    name: Build iOS App (Kivy-iOS)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          brew update
          brew install autoconf automake libtool pkg-config

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Kivy-iOS tools
        run: |
          python -m pip install --upgrade pip
          pip install kivy kivy-ios cython

      - name: Build iOS (toolchain build)
        run: |
          echo "⚠️ iOS build requires provisioning profile + Xcode setup"
          echo "Run kivy-ios toolchain manually or extend this workflow later"