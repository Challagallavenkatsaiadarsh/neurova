name: Windows Build (Python App)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # ================= CHECKOUT =================
      - uses: actions/checkout@v4

      # ================= PYTHON =================
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ================= SAFE ENV =================
      - name: Set safe environment (FIX OPENGL CRASH)
        shell: pwsh
        run: |
          echo "KIVY_GL_BACKEND=mock" >> $env:GITHUB_ENV
          echo "KIVY_WINDOW=dummy" >> $env:GITHUB_ENV
          echo "SDL_VIDEODRIVER=dummy" >> $env:GITHUB_ENV
          echo "PYTHONUNBUFFERED=1" >> $env:GITHUB_ENV

      # ================= CLEAN INSTALL =================
      - name: Upgrade pip + reinstall PyInstaller clean
        run: |
          python -m pip install --upgrade pip
          pip uninstall -y pyinstaller
          pip install pyinstaller --no-cache-dir
          pip install kivy kivymd requests numpy pygame oscpy

      # ================= CLEAN BUILD =================
      - name: Clean old builds
        shell: pwsh
        run: |
          if (Test-Path build) { Remove-Item build -Recurse -Force }
          if (Test-Path dist) { Remove-Item dist -Recurse -Force }
          Get-ChildItem -Filter "*.spec" -ErrorAction SilentlyContinue | Remove-Item -Force

      # ================= BUILD EXE (FIXED - NO ^ ERROR) =================
      - name: Build EXE (STABLE MODE)
        run: python -m PyInstaller --noconfirm --clean --onefile --windowed --name Neurova --paths=. --hidden-import=kivy --hidden-import=kivymd --hidden-import=requests --hidden-import=numpy --hidden-import=pygame --hidden-import=oscpy --exclude-module=tkinter --exclude-module=matplotlib main.py

      # ================= UPLOAD =================
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/