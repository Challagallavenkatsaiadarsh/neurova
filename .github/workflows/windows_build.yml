name: Windows Build (Python App)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # ================= CHECKOUT =================
      - uses: actions/checkout@v4

      # ================= PYTHON =================
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ================= SAFE ENV (IMPORTANT FIX) =================
      - name: Set safe environment (KIVY FIX)
        shell: pwsh
        run: |
          echo "KIVY_NO_ARGS=1" >> $env:GITHUB_ENV
          echo "KIVY_WINDOW=dummy" >> $env:GITHUB_ENV
          echo "SDL_VIDEODRIVER=dummy" >> $env:GITHUB_ENV
          echo "KIVY_GL_BACKEND=mock" >> $env:GITHUB_ENV
          echo "PYTHONUNBUFFERED=1" >> $env:GITHUB_ENV

      # ================= INSTALL =================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller kivy kivymd requests numpy pygame oscpy

      # ================= CLEAN BUILD =================
      - name: Clean old builds
        shell: pwsh
        run: |
          if (Test-Path build) { Remove-Item build -Recurse -Force }
          if (Test-Path dist) { Remove-Item dist -Recurse -Force }

      # ================= BUILD =================
      - name: Build EXE
        run: |
          python -m PyInstaller main.py `
            --name Neurova `
            --onefile `
            --windowed `
            --clean `
            --noconfirm `
            --paths=. `
            --hidden-import=kivy `
            --hidden-import=kivymd `
            --hidden-import=requests `
            --hidden-import=numpy `
            --hidden-import=pygame `
            --hidden-import=oscpy `
            --exclude-module=tkinter `
            --exclude-module=matplotlib `
            --runtime-hook disable_kivy_window.py

      # ================= UPLOAD =================
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/