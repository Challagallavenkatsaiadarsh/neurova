name: Windows Build (Python App)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ================= SAFE ENV =================
      - name: Set safe environment (FIX OPENGL CRASH)
        shell: pwsh
        run: |
          echo "KIVY_GL_BACKEND=mock" >> $env:GITHUB_ENV
          echo "KIVY_WINDOW=dummy" >> $env:GITHUB_ENV
          echo "SDL_VIDEODRIVER=dummy" >> $env:GITHUB_ENV
          echo "PYTHONUNBUFFERED=1" >> $env:GITHUB_ENV

      # ================= INSTALL =================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install kivy kivymd pyinstaller requests numpy pygame

      # ================= BUILD =================
      - name: Build EXE
        run: |
          python -m PyInstaller --onefile --windowed --clean --name Neurova main.py ^
          --paths=. ^
          --collect-submodules screens ^
          --collect-submodules kivy ^
          --collect-submodules kivymd

      # ================= UPLOAD =================
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/