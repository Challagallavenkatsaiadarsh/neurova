name: Windows Build (Python App)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ===============================
      # INSTALL DEPENDENCIES
      # ===============================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install kivy kivymd pyinstaller requests

      # ===============================
      # FIX OPENGL (CRITICAL)
      # ===============================
      - name: Set safe Kivy environment (fix OpenGL)
        run: |
          set KIVY_GL_BACKEND=angle_sdl2
          set SDL_VIDEODRIVER=dummy
          set PYTHONUNBUFFERED=1

      # ===============================
      # BUILD EXE
      # ===============================
      - name: Build EXE
        run: |
          python -m PyInstaller --onefile --windowed --name Neurova main.py

      # ===============================
      # UPLOAD OUTPUT
      # ===============================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/