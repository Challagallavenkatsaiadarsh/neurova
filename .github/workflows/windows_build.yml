name: Windows Build (Python App)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ===============================
      # SET SAFE ENVIRONMENT (CRITICAL FIRST)
      # ===============================
      - name: Set global Kivy safe environment
        shell: pwsh
        run: |
          echo "KIVY_GL_BACKEND=mock" >> $env:GITHUB_ENV
          echo "SDL_VIDEODRIVER=dummy" >> $env:GITHUB_ENV
          echo "PYTHONUNBUFFERED=1" >> $env:GITHUB_ENV
          echo "KIVY_NO_CONSOLELOG=1" >> $env:GITHUB_ENV
          echo "KIVY_NO_FILELOG=1" >> $env:GITHUB_ENV

      # ===============================
      # SETUP PYTHON
      # ===============================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ===============================
      # INSTALL DEPENDENCIES
      # ===============================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install kivy kivymd pyinstaller requests

      # ===============================
      # BUILD EXE (STABLE MODE)
      # ===============================
      - name: Build EXE
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name Neurova main.py

      # ===============================
      # UPLOAD OUTPUT
      # ===============================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/